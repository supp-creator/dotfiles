general {
    fade_in = 0.0
    fade_out = 0.0 
}

background {
    monitor =
    path = ~/Downloads/Wallpapers/wallpaper21.jpg   # change this
    blur_passes = 3
    blur_size = 7
    brightness = 0.6
    contrast = 1.0
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# Glass panel behind the elements
shape {
    monitor =
    size = 0, 0
    color = rgba(255, 255, 255, 0.06)
    rounding = 20
    border_size = 1
    border_color = rgba(255, 255, 255, 0.15)
    position = 0, 0
    halign = center
    valign = center
    shadow_passes = 2
    shadow_color = rgba(0, 0, 0, 0.3)
    shadow_size = 10
}

# Clock
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.92)
    font_size = 58
    font_family = JetBrainsMono Nerd Font
    position = 0, 90
    halign = center
    valign = center
    shadow_passes = 2
    shadow_color = rgba(0, 0, 0, 0.4)
    shadow_size = 4
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = rgba(255, 255, 255, 0.55)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}

# Password input box
input-field {
    monitor =
    size = 200, 43
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.12)
    inner_color = rgba(255, 255, 255, 0.05)
    font_color = rgba(255, 255, 255, 0.8)
    font_family = JetBrainsMono Nerd Font
    fade_on_empty = true
    placeholder_text = <span foreground="##ffffff88">󰌾  Password</span>
    check_color = rgba(204, 170, 221, 0.8)   # your #cad accent
    fail_color = rgba(220, 100, 100, 0.8)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    rounding = 14
    position = 0, -200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_color = rgba(0, 0, 0, 0.3)
    shadow_size = 6
}
